{% extends 'base.html' %}
{% block content %}

<h2>Intern List</h2>

<table class="table table-bordered">
<tr>
<th>ID</th><th>Name</th><th>Email</th><th>Domain</th><th>Action</th>
</tr>

{% for i in interns %}
<tr>
<td>{{i.id}}</td>
<td>{{i.name}}</td>
<td>{{i.email}}</td>
<td>{{i.domain}}</td>

<td>
<a href="/edit/{{i.id}}" class="btn btn-warning">Edit</a>
<a href="/delete/{{i.id}}" class="btn btn-danger">Delete</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
